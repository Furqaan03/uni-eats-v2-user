name: unieats_v2
description: "Uni Eats v2 - Campus food delivery app for UDST"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # State management & routing
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.0

  # UI
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.14
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  fl_chart: ^0.69.2

  # Firebase
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.5.1
  firebase_storage: ^12.3.7

  # Utils
  intl: ^0.20.1
  shared_preferences: ^2.3.3
  uuid: ^4.5.1

  # Security TODOs (MVP placeholders)
  # flutter_secure_storage: ^9.2.2  # TODO: enable for release
  # ssl_pinning_plugin: ^2.0.0       # TODO: enable for release

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Jumper
      fonts:
        - asset: assets/fonts/Jumper-Light.otf
          weight: 300
        - asset: assets/fonts/Jumper-Regular.otf
          weight: 400
        - asset: assets/fonts/Jumper-Medium.otf
          weight: 500
        - asset: assets/fonts/Jumper-Bold.otf
          weight: 700
        - asset: assets/fonts/Jumper-Black.otf
          weight: 900

    - family: Satoshi
      fonts:
        - asset: assets/fonts/Satoshi-Regular.otf
          weight: 400
        - asset: assets/fonts/Satoshi-Medium.otf
          weight: 500
        - asset: assets/fonts/Satoshi-Bold.otf
          weight: 700
        - asset: assets/fonts/Satoshi-Black.otf
          weight: 900
